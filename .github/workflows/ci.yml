name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ['1.26']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Fetch multi-frame test data
        run: bash scripts/fetch-testdata.sh

      - name: Test
        run: go test -count=1 -p 4 ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Fetch multi-frame test data
        run: bash scripts/fetch-testdata.sh

      - name: Test with coverage
        run: go test -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest -checks=all github.com/godicom-dev/godicom/...

      - name: Check gofmt
        run: |
          unformatted=$(find . -name '*.go' ! -path './pydicom/*' ! -name '*_generated.go' -print0 | xargs -0 gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed:"
            echo "$unformatted"
            exit 1
          fi
